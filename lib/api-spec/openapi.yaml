openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Email account registration and admin panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: registrations
    description: Registration operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List all registrations (admin)
      description: Returns all user email registrations for the admin panel
      responses:
        "200":
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Submit a registration
      description: User submits their email and password to register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /registrations/stats:
    get:
      operationId: getRegistrationStats
      tags: [registrations]
      summary: Get registration statistics (admin)
      description: Returns total count and recent activity stats
      responses:
        "200":
          description: Registration stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationStats"

  /registrations/{id}:
    delete:
      operationId: deleteRegistration
      tags: [registrations]
      summary: Delete a registration (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Registration:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    RegistrationInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    RegistrationStats:
      type: object
      required: [total, todayCount, weekCount]
      properties:
        total:
          type: integer
        todayCount:
          type: integer
        weekCount:
          type: integer

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
