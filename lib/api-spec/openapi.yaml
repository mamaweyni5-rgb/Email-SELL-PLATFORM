openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Email marketplace platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: profile
  - name: submissions
  - name: withdrawals
  - name: settings
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get own profile with wallet and submission stats
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions:
    get:
      operationId: listSubmissions
      tags: [submissions]
      summary: List own email submissions
      responses:
        "200":
          description: Own submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSubmission
      tags: [submissions]
      summary: Submit an email account for sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionInput"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List own withdrawal requests
      responses:
        "200":
          description: Own withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a withdrawal to Telebirr
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Insufficient balance or invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current platform settings (e.g. price per email)
      responses:
        "200":
          description: Platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /referral:
    get:
      operationId: getReferralInfo
      tags: [profile]
      summary: Get current user referral code and stats
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/submissions:
    get:
      operationId: adminListSubmissions
      tags: [admin]
      summary: List all submitted email accounts
      responses:
        "200":
          description: All submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSubmission"

  /admin/submissions/{id}:
    patch:
      operationId: adminUpdateSubmission
      tags: [admin]
      summary: Approve or reject a submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionStatusUpdate"
      responses:
        "200":
          description: Updated submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSubmission"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawal requests
      responses:
        "200":
          description: All withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawal"

  /admin/withdrawals/{id}:
    patch:
      operationId: adminUpdateWithdrawal
      tags: [admin]
      summary: Complete or reject a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalStatusUpdate"
      responses:
        "200":
          description: Updated withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users with stats
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/settings:
    patch:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update platform settings (price per email etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /admin/broadcast:
    post:
      operationId: adminSendBroadcast
      tags: [admin]
      summary: Send a broadcast message to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "201":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broadcast"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /broadcasts:
    get:
      operationId: listBroadcasts
      tags: [profile]
      summary: List recent broadcast announcements
      responses:
        "200":
          description: Recent broadcasts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broadcast"

  /admin/verify-password:
    post:
      operationId: adminVerifyPassword
      tags: [admin]
      summary: Verify the admin panel password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVerifyPasswordInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPasswordCheckResult"

  /admin/change-password:
    patch:
      operationId: adminChangePassword
      tags: [admin]
      summary: Change the admin panel password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminChangePasswordInput"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPasswordCheckResult"
        "401":
          description: Current password is wrong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AuthUser:
      type: object
      required: [id, email, walletBalance]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
          nullable: true
        walletBalance:
          type: integer

    UserProfile:
      type: object
      required: [id, email, walletBalance, totalSubmissions, approvedSubmissions, pendingSubmissions]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
          nullable: true
        walletBalance:
          type: integer
        totalSubmissions:
          type: integer
        approvedSubmissions:
          type: integer
        pendingSubmissions:
          type: integer

    UserInput:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 6
        referralCode:
          type: string

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Email address or display name
        password:
          type: string

    Submission:
      type: object
      required: [id, email, status, pricePaid, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        pricePaid:
          type: integer
        rejectionNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SubmissionInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AdminSubmission:
      type: object
      required: [id, userId, userEmail, email, password, status, pricePaid, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userEmail:
          type: string
        email:
          type: string
        password:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        pricePaid:
          type: integer
        rejectionNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SubmissionStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        rejectionNote:
          type: string

    Withdrawal:
      type: object
      required: [id, amount, telebirrNumber, telebirrName, status, createdAt]
      properties:
        id:
          type: integer
        amount:
          type: integer
        telebirrNumber:
          type: string
        telebirrName:
          type: string
        status:
          type: string
          enum: [pending, completed, rejected]
        adminNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    WithdrawalInput:
      type: object
      required: [amount, telebirrNumber, telebirrName]
      properties:
        amount:
          type: integer
          minimum: 1
        telebirrNumber:
          type: string
          minLength: 10
        telebirrName:
          type: string
          minLength: 1

    AdminWithdrawal:
      type: object
      required: [id, userId, userEmail, amount, telebirrNumber, telebirrName, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userEmail:
          type: string
        amount:
          type: integer
        telebirrNumber:
          type: string
        telebirrName:
          type: string
        status:
          type: string
          enum: [pending, completed, rejected]
        adminNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    WithdrawalStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [completed, rejected]
        adminNote:
          type: string

    AdminUser:
      type: object
      required: [id, email, walletBalance, totalSubmissions, approvedSubmissions, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        walletBalance:
          type: integer
        totalSubmissions:
          type: integer
        approvedSubmissions:
          type: integer
        createdAt:
          type: string
          format: date-time

    AdminStats:
      type: object
      required: [totalUsers, totalSubmissions, pendingSubmissions, approvedSubmissions, totalEmailsBought, totalPayoutsBirr, pendingWithdrawals]
      properties:
        totalUsers:
          type: integer
        totalSubmissions:
          type: integer
        pendingSubmissions:
          type: integer
        approvedSubmissions:
          type: integer
        totalEmailsBought:
          type: integer
        totalPayoutsBirr:
          type: integer
        pendingWithdrawals:
          type: integer

    PlatformSettings:
      type: object
      required: [pricePerEmail, referralCommissionPct]
      properties:
        pricePerEmail:
          type: integer
        referralCommissionPct:
          type: integer

    SettingsUpdate:
      type: object
      required: [pricePerEmail, referralCommissionPct]
      properties:
        pricePerEmail:
          type: integer
          minimum: 1
        referralCommissionPct:
          type: integer
          minimum: 0
          maximum: 100

    ReferralInfo:
      type: object
      required: [referralCode, referralCount, commissionEarned]
      properties:
        referralCode:
          type: string
        referralCount:
          type: integer
        commissionEarned:
          type: integer

    BroadcastInput:
      type: object
      required: [title, message]
      properties:
        title:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    Broadcast:
      type: object
      required: [id, title, message, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    AdminVerifyPasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminPasswordCheckResult:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean

    AdminChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
